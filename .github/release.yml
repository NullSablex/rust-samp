# Config for GitHub's "Generate release notes" API.
# Consumed by .github/workflows/release.yml (softprops/action-gh-release with
# `generate_release_notes: true`). Categories below mirror the labels defined
# in .github/labels.yml; the "New Contributors" section is added automatically
# by GitHub when first-time contributors are detected since the previous tag.

changelog:
  exclude:
    labels:
      - ignore-for-release
      - skip-release-notes
    authors:
      - dependabot
      - dependabot[bot]
      - github-actions
      - github-actions[bot]

  categories:
    - title: New features
      labels:
        - feat
        - feature

    - title: Fixes
      labels:
        - fix
        - bugfix
        - bug

    - title: Documentation
      labels:
        - docs
        - documentation

    - title: Refactor
      labels:
        - refactor

    - title: Maintenance
      labels:
        - chore
        - ci
        - deps

    - title: Other changes
      labels:
        - "*"
