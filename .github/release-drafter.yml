name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: 'New features'
    labels:
      - 'feat'
      - 'feature'
  - title: 'Fixes'
    labels:
      - 'fix'
      - 'bugfix'
      - 'bug'
  - title: 'Documentation'
    labels:
      - 'docs'
      - 'documentation'
  - title: 'Maintenance'
    labels:
      - 'chore'
      - 'ci'
      - 'refactor'
      - 'deps'

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - 'major'
      - 'breaking'
  minor:
    labels:
      - 'minor'
      - 'feat'
      - 'feature'
  patch:
    labels:
      - 'patch'
      - 'fix'
      - 'bugfix'
      - 'docs'
      - 'chore'
      - 'ci'
  default: patch

template: |
  ## What's changed

  $CHANGES

  ## Contributors

  Thanks to everyone who contributed to this release: $CONTRIBUTORS
