name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create release + upload tarball

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history so generate_release_notes can list every commit

      - name: Build SDK source tarball
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE="rust-samp-${TAG}-src.tar.gz"

          # Allowlist — only the SDK crates, the workspace manifests and the
          # license end up in the release artefact. Docs, scripts, examples,
          # `.github`, `changelog/`, `ROADMAP.md`, `mkdocs.yml`, `notes/` and
          # anything generated by build/bench steps stays out by construction.
          #
          # The `--exclude` flags are defensive: they make sure no
          # `target/`, `site/`, `dist/`, `__pycache__/`, `.git*` or
          # OS-junk file slips in even if the runner has leftovers.
          tar -czf "$ARCHIVE" \
              --exclude='target' \
              --exclude='site' \
              --exclude='dist' \
              --exclude='__pycache__' \
              --exclude='*.pyc' \
              --exclude='*.rs.bk' \
              --exclude='.DS_Store' \
              --exclude='Thumbs.db' \
              --exclude='.git*' \
              --exclude='*.swp' \
              --exclude='*.swo' \
              samp/ \
              samp-sdk/ \
              samp-codegen/ \
              Cargo.toml \
              Cargo.lock \
              LICENSE

          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Verify tarball contents
        run: |
          # Fail the release if any forbidden path slipped into the archive.
          # Keeps the artefact strictly limited to the SDK crates + manifests.
          FORBIDDEN_PATTERN='^(docs/|examples/|scripts/|\.github/|changelog/|notes/|overrides/|mkdocs\.yml|ROADMAP\.md|CHANGELOG\.md|migration\.md|README\.md|target/|site/|dist/|.*\.pyc$|__pycache__/)'
          UNEXPECTED=$(tar -tzf "$ARCHIVE" | grep -E "$FORBIDDEN_PATTERN" || true)
          if [ -n "$UNEXPECTED" ]; then
            echo "::error::Tarball contains forbidden paths:"
            echo "$UNEXPECTED"
            exit 1
          fi
          echo "Tarball verified — only allowlisted paths present:"
          tar -tzf "$ARCHIVE" | head -20

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          # Auto-generated notes via GitHub's API — uses .github/release.yml
          # for categories and includes a "New Contributors" section by default.
          # No CHANGELOG dependency: the release body comes from PR titles +
          # labels merged since the previous tag.
          generate_release_notes: true
          files: ${{ env.ARCHIVE }}
          draft: false
          prerelease: false
