name: Release

# Tag push → builds tarball, creates GitHub Release and publishes the three
# workspace crates to crates.io in dependency order. Manual dispatch lets
# you exercise the workflow without actually publishing or creating a
# release (dry-run).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run only — validate, no release, no crates.io upload'
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create release + upload tarball

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0   # full history so the generate-notes API can list every commit

      - name: Resolve dry-run flag
        id: flags
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] \
             && [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "dry_run_flag=--dry-run" >> "$GITHUB_OUTPUT"
            echo "is_dry_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "dry_run_flag=" >> "$GITHUB_OUTPUT"
            echo "is_dry_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install stable Rust + i686 target
        run: |
          rustup update stable --no-self-update
          rustup default stable
          rustup target add i686-unknown-linux-gnu
          rustup component add clippy

      - name: Install 32-bit system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib

      - name: Pre-release sanity check
        run: |
          cargo check --target i686-unknown-linux-gnu --all-targets
          cargo clippy --target i686-unknown-linux-gnu --all-targets -- -D warnings

      - name: Build release body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          # 1. Curated section from CHANGELOG.md — headlines, migration notes,
          # breaking changes. Everything that humans wrote and the API cannot
          # infer from PR titles alone.
          BODY=$(awk "/^## \[?v?${VERSION}\]?/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          if [ -z "$BODY" ]; then
            BODY="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi

          # 2. Auto-generated notes — used only to borrow the "New Contributors"
          # block and the "Full Changelog" comparison link that GitHub computes
          # natively. The "## What's Changed" categorisation produced here is
          # dropped on purpose; the CHANGELOG already does that job with more
          # context.
          AUTO=$(gh api -X POST "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="$TAG" \
            -q .body 2>/dev/null || echo "")

          # Everything from "## New Contributors" onwards already includes the
          # "Full Changelog" link as its last line. Fall back to just the link
          # if no first-time contributors were detected.
          APPENDIX=$(echo "$AUTO" | sed -n '/^## New Contributors$/,$p')
          if [ -z "$APPENDIX" ]; then
            APPENDIX=$(echo "$AUTO" | grep '^\*\*Full Changelog\*\*' | tail -1)
          fi

          {
            echo "$BODY"
            if [ -n "$APPENDIX" ]; then
              echo ""
              echo "---"
              echo ""
              echo "$APPENDIX"
            fi
          } > release_body.md

      - name: Build SDK source tarball
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE="rust-samp-${TAG}-src.tar.gz"

          # Allowlist — only the SDK crates, the workspace manifests and the
          # license end up in the release artefact. Docs, scripts, examples,
          # `.github`, `changelog/`, `ROADMAP.md`, `mkdocs.yml`, `notes/` and
          # anything generated by build/bench steps stays out by construction.
          #
          # The `--exclude` flags are defensive: they make sure no
          # `target/`, `site/`, `dist/`, `__pycache__/`, `.git*` or
          # OS-junk file slips in even if the runner has leftovers.
          tar -czf "$ARCHIVE" \
              --exclude='target' \
              --exclude='site' \
              --exclude='dist' \
              --exclude='__pycache__' \
              --exclude='*.pyc' \
              --exclude='*.rs.bk' \
              --exclude='.DS_Store' \
              --exclude='Thumbs.db' \
              --exclude='.git*' \
              --exclude='*.swp' \
              --exclude='*.swo' \
              samp/ \
              samp-sdk/ \
              samp-codegen/ \
              Cargo.toml \
              Cargo.lock \
              LICENSE

          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Verify tarball contents
        run: |
          # Fail the release if any forbidden path slipped into the archive.
          # Keeps the artefact strictly limited to the SDK crates + manifests.
          FORBIDDEN_PATTERN='^(docs/|examples/|scripts/|\.github/|changelog/|notes/|overrides/|mkdocs\.yml|ROADMAP\.md|CHANGELOG\.md|migration\.md|README\.md|target/|site/|dist/|.*\.pyc$|__pycache__/)'
          UNEXPECTED=$(tar -tzf "$ARCHIVE" | grep -E "$FORBIDDEN_PATTERN" || true)
          if [ -n "$UNEXPECTED" ]; then
            echo "::error::Tarball contains forbidden paths:"
            echo "$UNEXPECTED"
            exit 1
          fi
          echo "Tarball verified — only allowlisted paths present:"
          tar -tzf "$ARCHIVE" | head -20

      - name: Create GitHub Release
        if: steps.flags.outputs.is_dry_run == 'false'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          name: ${{ github.ref_name }}
          body_path: release_body.md
          files: ${{ env.ARCHIVE }}
          draft: false
          prerelease: false

      # Each publish step is a thin wrapper around `cargo publish`:
      # - If the version is new, publish it and wait for the index to update.
      # - If the version is already on crates.io (e.g. a patch release that
      #   only bumped one crate), emit a notice and continue. This lets a
      #   re-tag of the workspace go through without manual surgery.
      - name: Publish rust-samp-sdk
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set +e
          OUTPUT=$(cargo publish -p rust-samp-sdk \
            --target i686-unknown-linux-gnu ${{ steps.flags.outputs.dry_run_flag }} 2>&1)
          STATUS=$?
          echo "$OUTPUT"
          if [ $STATUS -ne 0 ]; then
            if echo "$OUTPUT" | grep -qE "already (uploaded|exists|published)"; then
              echo "::notice::rust-samp-sdk version already on crates.io — skipping"
              exit 0
            fi
            exit $STATUS
          fi

      - name: Wait for rust-samp-sdk to be indexed
        if: steps.flags.outputs.is_dry_run == 'false'
        run: |
          # crates.io needs a moment to index the freshly-published version
          # before the next crate's `cargo publish` can resolve it.
          sleep 30

      - name: Publish rust-samp-codegen
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set +e
          OUTPUT=$(cargo publish -p rust-samp-codegen \
            --target i686-unknown-linux-gnu ${{ steps.flags.outputs.dry_run_flag }} 2>&1)
          STATUS=$?
          echo "$OUTPUT"
          if [ $STATUS -ne 0 ]; then
            if echo "$OUTPUT" | grep -qE "already (uploaded|exists|published)"; then
              echo "::notice::rust-samp-codegen version already on crates.io — skipping"
              exit 0
            fi
            exit $STATUS
          fi

      - name: Wait for rust-samp-codegen to be indexed
        if: steps.flags.outputs.is_dry_run == 'false'
        run: sleep 30

      - name: Publish rust-samp
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set +e
          OUTPUT=$(cargo publish -p rust-samp \
            --target i686-unknown-linux-gnu ${{ steps.flags.outputs.dry_run_flag }} 2>&1)
          STATUS=$?
          echo "$OUTPUT"
          if [ $STATUS -ne 0 ]; then
            if echo "$OUTPUT" | grep -qE "already (uploaded|exists|published)"; then
              echo "::notice::rust-samp version already on crates.io — skipping"
              exit 0
            fi
            exit $STATUS
          fi

      - name: Summary
        if: always()
        run: |
          {
            echo "## Release summary"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Tag | \`${GITHUB_REF_NAME:-(manual run)}\` |"
            echo "| Trigger | ${{ github.event_name }} |"
            echo "| Dry-run | ${{ steps.flags.outputs.is_dry_run }} |"
            echo "| Tarball | \`${ARCHIVE:-not built}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
